version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Node.js / Express API backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: automation-backend
    restart: unless-stopped
    env_file:
      - ./server/.env           # Keep secrets out of this file
    environment:
      NODE_ENV: production
      PORT: 3001
      # Override localhost URLs that won't work inside Docker
      GRAPHIC_GENERATOR_URL: http://ai-agents:8000
      PYTHON_API_URL: http://ai-agents:8000
    ports:
      - "3001:3001"
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # React / Vite frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Pass at build time: docker-compose build --build-arg VITE_API_BASE_URL=https://your-backend.azurewebsites.net
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_BLOGS_API_KEY: ${VITE_FIREBASE_BLOGS_API_KEY}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: automation-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Static Ebook page
  # ─────────────────────────────────────────────
  ebook:
    build:
      context: ./ebook-deploy
      dockerfile: Dockerfile
    container_name: automation-ebook
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
